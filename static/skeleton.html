<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Agent Party</title>
  <style>
    /* --- 样式部分保持不变 --- */
    :root {
      --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --text-color: #111111;
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      font-family: var(--font-main);
      overflow: hidden;
      user-select: none;
    }

    .fluid-background {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0; background: #ffffff; filter: blur(80px); opacity: 0.6;
    }

    .blob { position: absolute; border-radius: 50%; animation: float 10s infinite ease-in-out alternate; }
    .blob-1 { top: 10%; left: 20%; width: 500px; height: 500px; background: #a8edea; animation-delay: 0s; }
    .blob-2 { bottom: 10%; right: 20%; width: 400px; height: 400px; background: #fed6e3; animation-delay: -5s; }
    .blob-3 { top: 40%; left: 40%; width: 300px; height: 300px; background: #e0c3fc; animation-delay: -2s; }

    #app {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      height: 100vh; width: 100vw;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    #app.fade-out { opacity: 0; transform: scale(1.05); filter: blur(5px); }

    .center-visual { display: flex; flex-direction: column; align-items: center; margin-bottom: 60px; }
    .logo-img {
      width: 200px; height: 200px; object-fit: contain; margin-bottom: 10px;
      filter: drop-shadow(0 15px 30px rgba(0,0,0,0.08)); 
      animation: breathe 5s ease-in-out infinite;
    }
    .app-name { font-size: 42px; font-weight: 800; letter-spacing: -0.04em; color: var(--text-color); margin: 0; }
    .app-desc { margin-top: 10px; font-size: 14px; color: #666; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }

    .loader-container {
      position: absolute; bottom: 80px; 
      display: flex; flex-direction: column; align-items: center;
      min-height: 100px; transition: opacity 0.3s ease;
    }
    .percent-text { font-size: 64px; font-weight: 200; color: var(--text-color); font-variant-numeric: tabular-nums; line-height: 1; display: flex; align-items: flex-start; }
    .percent-symbol { font-size: 24px; margin-top: 10px; margin-left: 4px; opacity: 0.4; }
    .loading-label { margin-top: 12px; font-size: 12px; color: #888; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }

    .drag-layer { position: fixed; top: 0; left: 0; width: 100%; height: 40px; -webkit-app-region: drag; z-index: 100; }

    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.2); backdrop-filter: blur(5px);
      z-index: 999; display: flex; justify-content: center; align-items: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    .modal-overlay.visible { opacity: 1; pointer-events: auto; }

    .server-modal {
      width: 360px; padding: 30px; background: #fff; border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2); transform: translateY(20px);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); text-align: center;
    }
    .modal-overlay.visible .server-modal { transform: translateY(0); }

    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: #333; }
    .server-input {
      width: 100%; padding: 12px 15px; border: 2px solid #eee; border-radius: 12px;
      font-size: 14px; outline: none; margin-bottom: 15px; box-sizing: border-box;
      font-family: monospace; text-align: center; transition: border-color 0.2s;
    }
    .server-input:focus { border-color: #333; }

    .btn-connect {
      background: #111; color: #fff; border: none; padding: 12px 40px;
      border-radius: 30px; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: transform 0.2s; width: 100%;
    }
    .btn-connect:hover { transform: scale(1.02); }
    .btn-connect:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg { color: #ff4757; font-size: 12px; margin-top: 15px; min-height: 15px; }

    @keyframes float { 0% { transform: translate(0, 0) scale(1); } 50% { transform: translate(30px, -30px) scale(1.1); } 100% { transform: translate(-20px, 20px) scale(0.9); } }
    @keyframes breathe { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
  </style>
</head>
<body>
  <div class="drag-layer"></div>

  <div class="fluid-background">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div id="app">
    <div class="center-visual">
      <img src="source/logo.png" alt="Logo" class="logo-img">
      <h1 class="app-name">Super Agent Party</h1>
      <div class="app-desc">Intelligent Workspace</div>
    </div>

    <div class="loader-container" id="loader">
      <div class="percent-text">
        <span id="counter">0</span><span class="percent-symbol">%</span>
      </div>
      <div class="loading-label" id="status-text">Detecting Server...</div>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="server-modal">
      <div class="modal-title">Connect to Server</div>
      <input type="text" class="server-input" id="serverUrl" placeholder="http://127.0.0.1:3456" value="http://127.0.0.1:3456">
      <button class="btn-connect" id="btnConnect">Connect</button>
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>

  <script>
    // ★★★ 核心修复：直接获取 window.electron ★★★
    const electronBridge = window.electron || {};
    
    // 如果 preload 没加载成功或者沙盒问题，这里会没有 invoke 方法
    if (!electronBridge.invoke) {
      console.error("IPC Bridge not found! Check preload.js & main.js sandbox setting.");
      document.getElementById('errorMsg').innerText = "System Error: IPC Bridge Missing";
    }

    const counterEl = document.getElementById('counter');
    const statusText = document.getElementById('status-text');
    const loader = document.getElementById('loader');
    const modalOverlay = document.getElementById('modalOverlay');
    const serverInput = document.getElementById('serverUrl');
    const btnConnect = document.getElementById('btnConnect');
    const errorMsg = document.getElementById('errorMsg');

    const DEFAULT_SERVER = 'http://127.0.0.1:3456';
    const CACHE_KEY = 'sap_last_server_url';

    // 读取上次成功连接的 URL，填入输入框
    function loadCachedUrl() {
      try {
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached && cached !== DEFAULT_SERVER) {
          serverInput.value = cached;
          serverInput.style.borderColor = '#a0c4ff';
          const hint = document.createElement('div');
          hint.style.cssText = 'font-size:11px;color:#888;margin-bottom:8px;';
          hint.innerText = '↑ Last connected server';
          serverInput.parentNode.insertBefore(hint, serverInput.nextSibling);
        }
      } catch(e) {}
    }

    // 保存成功连接的 URL
    function saveCachedUrl(url) {
      try { localStorage.setItem(CACHE_KEY, url); } catch(e) {}
    }
    let currentNum = 0;
    let targetNum = 0;
    
    function animateCounter() {
      if (currentNum < targetNum) {
        currentNum++;
        counterEl.innerText = currentNum;
      } else if (currentNum > targetNum) {
        currentNum = 0;
        counterEl.innerText = 0;
      }
      requestAnimationFrame(animateCounter);
    }
    animateCounter();

    async function checkServer(url) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 5000);
      try {
        await fetch(url, { method: 'GET', signal: controller.signal });
        clearTimeout(timeoutId);
        return true; 
      } catch (error) {
        return false;
      }
    }

    // ★★★ 修复：调用 electronBridge.invoke ★★★
    async function connectToBackend(url) {
      console.log('Requesting jump to:', url);
      if (electronBridge.invoke) {
        try {
          document.getElementById('app').classList.add('fade-out');
          // 这里使用 electronBridge.invoke，对应 preload 中的 window.electron.invoke
          const result = await electronBridge.invoke('connect-to-backend', url);
          if (!result.success) {
            console.error('Jump failed:', result.error);
            document.getElementById('app').classList.remove('fade-out');
            alert('Redirect failed: ' + result.error);
          }
        } catch (e) {
          console.error('IPC invoke error:', e);
          alert('System Interface Error: ' + e.message);
        }
      } else {
        alert('Electron IPC not available');
      }
    }

    async function init() {
      targetNum = 30;
      statusText.innerText = "Checking Default Port...";
      
      const isDefaultAlive = await checkServer(DEFAULT_SERVER);

      if (isDefaultAlive) {
        targetNum = 100;
        statusText.innerText = "Connected";
        saveCachedUrl(DEFAULT_SERVER);
        setTimeout(() => connectToBackend(DEFAULT_SERVER), 800);
      } else {
        targetNum = 0;
        showModal();
      }
    }

    function showModal() {
      loader.style.opacity = '0';
      setTimeout(() => {
        loader.style.display = 'none';
        loadCachedUrl();
        modalOverlay.classList.add('visible');
      }, 300);
    }

    async function handleManualConnect() {
      const url = serverInput.value.replace(/\/$/, '');
      if (!url) return;

      btnConnect.disabled = true;
      btnConnect.innerText = "Connecting...";
      errorMsg.innerText = "";

      const isAlive = await checkServer(url);

      if (isAlive) {
        btnConnect.innerText = "Success";
        saveCachedUrl(url);
        connectToBackend(url);
      } else {
        btnConnect.disabled = false;
        btnConnect.innerText = "Connect";
        errorMsg.innerText = "Connection failed or timeout.";
      }
    }

    btnConnect.addEventListener('click', handleManualConnect);
    serverInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleManualConnect();
    });

    init();
  </script>
</body>
</html>
